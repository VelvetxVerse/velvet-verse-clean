# ============================================================
# Decap CMS Configuration — Velvet Verse by Renata
# Blog admin panel at: velvetxverse.com/admin
# Uses Netlify Identity for login (no GitHub OAuth needed)
# ============================================================

backend:
  name: git-gateway
  branch: main

# Where uploaded images are stored
media_folder: "public/blog-images"
public_folder: "/blog-images"

# Blog posts collection
collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "src/content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Category", name: "category", widget: "select", options: ["Tutorial", "Review", "Lifestyle", "Tips", "Collaboration"] }
      - { label: "Cover Image", name: "image", widget: "image", required: false }
      - { label: "Excerpt", name: "excerpt", widget: "text", hint: "Short summary shown on the blog grid (1-2 sentences)" }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
